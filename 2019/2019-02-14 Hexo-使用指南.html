        <p>git 与 github 连接</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">git config --global user.name <span class="string">"ylm98"</span></span><br><span class="line">git config --global user.email <span class="string">"953949233@qq.com"</span></span><br><span class="line">ssh-keygen -t rsa -C <span class="string">"953949233@qq.com"</span></span><br><span class="line"></span><br><span class="line">:测试，出现用户名即为连接成功</span><br><span class="line">ssh -T git@github.com</span><br></pre></td></tr></table></figure>
<p>安装 hexo（需要安装 Node.js, git）</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">npm install hexo-cli -g</span><br><span class="line">hexo init</span><br><span class="line">npm install</span><br><span class="line"></span><br><span class="line">:测试，出现版本号即为安装成功</span><br><span class="line">hexo -v</span><br><span class="line"></span><br><span class="line">:安装部署工具</span><br><span class="line">npm install hexo-deployer-git --save</span><br></pre></td></tr></table></figure>
<p>用 git 部署 hexo 的配置文件</p>
<p><code>./_config.yml</code></p>
<figure class="highlight yaml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># Deployment</span></span><br><span class="line"><span class="comment">## Docs: https://hexo.io/docs/deployment.html</span></span><br><span class="line"><span class="attr">deploy:</span></span><br><span class="line"><span class="attr">  type:</span> <span class="string">git</span></span><br><span class="line"><span class="attr">  repository:</span> <span class="attr">https://github.com/ylm98/ylm98.github.io.git</span></span><br><span class="line"><span class="attr">  branch:</span> <span class="string">master</span></span><br><span class="line">  </span><br><span class="line"><span class="comment"># 更多配置见 https://hexo.io/zh-cn/docs/configuration</span></span><br></pre></td></tr></table></figure>
<p>最后一步</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">:清理</span><br><span class="line">hexo clean</span><br><span class="line">:生成</span><br><span class="line">hexo generate</span><br><span class="line">:预览</span><br><span class="line">hexo server</span><br><span class="line">:部署</span><br><span class="line">hexo deploy</span><br><span class="line">:帮助</span><br><span class="line">hexo help</span><br></pre></td></tr></table></figure>
<p>安装主题</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git clone --branch v7.0.0 https://github.com/theme-next/hexo-theme-next themes/next</span><br></pre></td></tr></table></figure>
<p><code>./_config.yml</code></p>
<figure class="highlight yaml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="attr">theme:</span> <span class="string">landscape</span> <span class="bullet">-&gt;</span> <span class="attr">theme:</span> <span class="string">next</span></span><br></pre></td></tr></table></figure>
